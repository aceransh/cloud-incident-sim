services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_orchestrator
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - incident-sim-net

  user_service:
    build:
      context: ./services/user_service
      dockerfile: Dockerfile
    container_name: user_service_victim 
    ports:
      - "5001:5001"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - incident-sim-net
    
  postgres_db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      - POSTGRES_DB=incident_sim_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - incident-sim-net
  
  health_checker:
    build:
      context: ./services/health_checker
      dockerfile: Dockerfile
    container_name: health_checker
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - incident-sim-net

networks:
  incident-sim-net:
    driver: bridge