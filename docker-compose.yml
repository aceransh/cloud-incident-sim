version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_orchestrator
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - incident-sim-net

  user_service:
    build:
      context: ./services/user_service
      dockerfile: Dockerfile
    container_name: user_service_victim 
    ports:
      - "5001:5001"
    networks:
      - incident-sim-net

networks:
  incident-sim-net:
    driver: bridge